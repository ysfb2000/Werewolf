<div class="container theme-dark edition-setup-shell">

    <div class="edition-setup-header px-3 py-3">
        <button class="btn btn-sm btn-outline-light page-back-btn" type="button" (click)="back()">返回</button>

        <div class="edition-setup-title text-center">
            <h3>版本设置</h3>
        </div>

        <div class="edition-setup-action">
            <button *ngIf="isDefault != 'true'" class="btn btn-sm delete-edition-btn" type="button" (click)="deleteEdition()">
                <i class="bi bi-trash3-fill"></i>
            </button>
        </div>
    </div>

    <div class="edition-setup-body px-3 pb-4">
        <div class="edition-panel mb-4">
            <div class="row mb-3">
                <div class="col-md-12">
                    <input type="text" class="form-control edition-name-input mx-auto" style="width: 95%;" placeholder="请输入版本名称" [(ngModel)]="editionName">
                </div>
            </div>

            <div class="edition-summary row mb-3 px-3 text-center">
                <span>村民X{{ villagerCount }} 狼人X{{ wolfCount }} 中立X{{ neturalsCount }}</span>
            </div>

            <div class="edition-role-grid mb-3">
                <app-role-square *ngFor="let item of roleList" class="px-0" [roleName]="item.name" [(roleNumber)]="item.selectedCount" (roleNumberChange)="roleNumberChange()"></app-role-square>
            </div>
        </div>

        <div class="edition-panel row mb-3 px-3">
            <label class="col-md-12 text-start mb-3">特殊规则</label>

            <div class="col-6 special-rule">
                <input type="checkbox" [(ngModel)]="selectedSpecialRules['有警长']"> 有警长
            </div>

            <div class="col-6 special-rule">
                <input type="checkbox" [(ngModel)]="selectedSpecialRules['警长1.5票']"> 警长1.5票
            </div>

            <div class="col-12 special-rule">
                <input type="checkbox" [(ngModel)]="selectedSpecialRules['所有神民死亡狼获胜']"> 所有神民死亡则狼人胜利
            </div>

            <div class="col-12 special-rule">
                <input type="checkbox" [(ngModel)]="selectedSpecialRules['所有平民死亡狼获胜']"> 所有平民死亡则狼人胜利
            </div>

            <div class="col-12 special-rule">
                <input type="checkbox" [(ngModel)]="selectedSpecialRules['狼人首夜不能攻击']"> 狼人首夜不能攻击
            </div>

            <div *ngIf="isShowHunterRule" class="col-12 special-rule">
                <input type="checkbox" [(ngModel)]="selectedSpecialRules['猎人被公投出局可开枪']"> 猎人被公投出局可开枪
            </div>

            <div *ngIf="isShowWitchRule" class="col-12 special-rule">
                <input type="checkbox" [(ngModel)]="selectedSpecialRules['女巫首夜可自救']"> 女巫首夜可自救
            </div>
        </div>

        <div class="row justify-content-center mt-4 mb-2">
            <div class="col-auto edition-footer-actions">
                <button *ngIf="isDefault != 'true'" class="btn btn-primary edition-footer-btn" (click)="create()">创建</button>
            </div>
        </div>
    </div>
</div>

<app-message-box #myModal [url]="url"></app-message-box>
<app-confirm-box #confirmBox (ok)="delete()"></app-confirm-box>
